---
- name: Fix locks and install Nginx + dependencies
  hosts: webservers
  become: yes

  vars:
    nginx_dependencies:
      - nginx
      - curl
      - ufw
      - software-properties-common

  tasks:
    - name: Remove dpkg and apt locks
      ansible.builtin.shell: |
        rm -f /var/lib/dpkg/lock-frontend
        rm -f /var/lib/dpkg/lock
        rm -f /var/cache/apt/archives/lock

    - name: Configure any half-installed packages
      ansible.builtin.shell: dpkg --configure -a

    - name: Reboot the machine
      ansible.builtin.reboot:
        msg: "Rebooting to apply system changes"
        reboot_timeout: 600

    - name: Wait for host to come back up
      ansible.builtin.wait_for_connection:
        connect_timeout: 10
        sleep: 5
        delay: 10
        timeout: 300

    - name: Install Nginx and dependencies
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
      loop: "{{ nginx_dependencies }}"

    - name: Ensure Nginx is started and enabled
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: yes
