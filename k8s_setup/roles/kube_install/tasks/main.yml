---
# 1) Install Docker 
- name: Install Docker
  ansible.builtin.apt:
    name: docker.io
    state: present
    update_cache: yes

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    state: started

# 2) Add Kubernetes repo properly (NO deprecated apt_key!)
- name: Install dependencies for Kubernetes repo
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
    state: present
    update_cache: yes

- name: Add Kubernetes GPG key securely
  ansible.builtin.shell: |
    curl -fsSLo /usr/share/keyrings/kubernetes-archive-keyring.gpg https://packages.cloud.google.com/apt/doc/apt-key.gpg
  args:
    creates: /usr/share/keyrings/kubernetes-archive-keyring.gpg

- name: Add Kubernetes repository using signed-by
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    content: |
      deb [signed-by=/usr/share/keyrings/kubernetes-archive-keyring.gpg] https://apt.kubernetes.io/ kubernetes-xenial main

# 3) Install kubeadm, kubelet, kubectl
- name: Install kubeadm, kubelet, kubectl
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: yes

- name: Hold Kubernetes packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

# 4) Initialize master
- name: Initialize Kubernetes master
  ansible.builtin.shell: kubeadm init --pod-network-cidr=192.168.0.0/16
  args:
    creates: /etc/kubernetes/admin.conf
  when: "'kube_master' in group_names"
  register: kubeadm_init

- name: Setup kubeconfig for ubuntu user
  ansible.builtin.shell: |
    mkdir -p $HOME/.kube
    cp -i /etc/kubernetes/admin.conf $HOME/.kube/config
    chown $(id -u):$(id -g) $HOME/.kube/config
  when: "'kube_master' in group_names"

- name: Install Calico CNI
  ansible.builtin.shell: |
    kubectl apply -f https://docs.projectcalico.org/manifests/calico.yaml
  when: "'kube_master' in group_names"

# 5) Get join command
- name: Get join command
  ansible.builtin.shell: kubeadm token create --print-join-command
  register: join_command
  when: "'kube_master' in group_names"

- name: Set fact for join command
  ansible.builtin.set_fact:
    join_command: "{{ join_command.stdout }}"
  when: "'kube_master' in group_names"

# 6) Join worker nodes
- name: Join worker nodes to cluster
  ansible.builtin.shell: "{{ hostvars[groups['kube_master'][0]].join_command }} --ignore-preflight-errors=all"
  when: "'kube_nodes' in group_names"
